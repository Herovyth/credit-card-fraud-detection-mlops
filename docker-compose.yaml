x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
    # Шлях до проєкту всередині контейнера
    ML_PROJECT_ROOT: /opt/ml_project
    MLFLOW_TRACKING_URI: sqlite:////opt/ml_project/mlflow.db
  volumes:
    # DAG-файли
    - ./dags:/opt/airflow/dags
    # Логи Airflow
    - airflow-logs:/opt/airflow/logs
    # Монтуємо весь ML-проєкт — щоб DAG мав доступ до src/, data/, models/
    - .:/opt/ml_project
  depends_on:
    postgres:
      condition: service_healthy

services:
  # База даних Airflow
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5

  # Ініціалізація БД Airflow
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com
        pip install dvc mlflow scikit-learn pandas joblib seaborn
    restart: "no"

  # Scheduler
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob"]
      interval: 30s
      retries: 3

  # Webserver
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      retries: 3

volumes:
  postgres-db:
  airflow-logs: